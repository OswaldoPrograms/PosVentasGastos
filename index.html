<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContaApp Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:       #0f1117;
            --ink-soft:  #1c2030;
            --surface:   #f5f4f0;
            --card:      #ffffff;
            --border:    #e8e6e0;
            --accent:    #1a3c5e;
            --accent-2:  #c8a96e;
            --green:     #1a6648;
            --green-lt:  #e8f5ef;
            --red:       #8b1a1a;
            --red-lt:    #fdf0f0;
            --amber:     #92600a;
            --amber-lt:  #fdf5e6;
            --muted:     #6b7280;
            --radius:    12px;
            --shadow:    0 2px 16px rgba(15,17,23,0.07);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--surface);
            color: var(--ink);
            margin: 0;
            padding-bottom: 90px;
        }

        /* ── HEADER ── */
        header {
            background: var(--ink);
            color: #fff;
            padding: 18px 20px 14px;
            position: sticky; top: 0; z-index: 200;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 1px 0 rgba(255,255,255,0.06);
        }
        .header-brand { display: flex; flex-direction: column; }
        .header-title { font-family: 'DM Serif Display', serif; font-size: 1.25rem; color: #fff; line-height: 1; }
        .header-sub { font-size: 0.62rem; color: var(--accent-2); font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 3px; }
        #sync-status {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 5px 12px;
            font-size: 0.68rem; font-weight: 500; color: rgba(255,255,255,0.65);
        }
        #sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-2); animation: blink 1.4s ease-in-out infinite; }
        #sync-dot.online  { background: #4ade80; animation: none; }
        #sync-dot.offline { background: #f87171; animation: none; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        /* ── WINDOWS ── */
        .window { display: none; padding: 18px 16px; animation: fadeUp 0.25s ease; }
        .window.active { display: block; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        /* ── SECTION HEADER ── */
        .section-header { margin-bottom: 18px; }
        .section-number { font-size: 0.62rem; font-weight: 700; color: var(--accent-2); letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 4px; }
        .section-title { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--ink); margin: 0; display: flex; align-items: center; gap: 10px; }

        /* ── CARDS ── */
        .card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px; border: 1px solid var(--border); }
        .card-title {
            font-size: 0.68rem; font-weight: 700; color: var(--muted);
            letter-spacing: 0.13em; text-transform: uppercase;
            margin: 0 0 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* ── BADGES ── */
        .edit-badge { background: var(--amber-lt); color: var(--amber); border: 1px solid #f0d08a; padding: 2px 10px; border-radius: 20px; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }

        /* ── FORMULARIOS ── */
        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 0.74rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.04em; }
        input, select {
            width: 100%; padding: 11px 14px;
            border: 1.5px solid var(--border); border-radius: 8px;
            font-size: 0.93rem; font-family: 'DM Sans', sans-serif;
            background: #fafaf8; color: var(--ink);
            transition: border-color 0.15s, box-shadow 0.15s;
            appearance: none; -webkit-appearance: none;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,60,94,0.1); background: #fff; }
        .hint { font-size: 0.72rem; color: var(--green); margin-top: 5px; font-weight: 600; }

        /* ── CHECK GRID ── */
        .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #fafaf8; padding: 12px; border-radius: 8px; border: 1.5px solid var(--border); margin-bottom: 14px; }
        .check-grid label { font-size: 0.82rem; color: var(--ink); font-weight: 500; display: flex; align-items: center; gap: 7px; margin: 0; cursor: pointer; }
        .check-grid input[type="checkbox"] { width: 16px; height: 16px; padding: 0; margin: 0; accent-color: var(--accent); flex-shrink: 0; }
        .check-single { grid-template-columns: 1fr; background: var(--green-lt); border-color: #a7d9c0; }
        .check-single label { color: var(--green); font-weight: 700; }

        /* ── BOTONES ── */
        button { border: none; border-radius: 9px; padding: 13px 16px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.88rem; cursor: pointer; transition: transform 0.1s, box-shadow 0.15s; width: 100%; margin-bottom: 6px; letter-spacing: 0.02em; }
        button:active { transform: scale(0.98); }
        .btn-primary { background: var(--ink); color: #fff; box-shadow: 0 2px 8px rgba(15,17,23,0.2); }
        .btn-primary:hover { box-shadow: 0 4px 16px rgba(15,17,23,0.3); }
        .btn-secondary { background: var(--card); color: var(--ink); border: 1.5px solid var(--border); }
        .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); font-size: 0.82rem; }
        .btn-danger { background: var(--red-lt); color: var(--red); border: 1.5px solid #e8b4b4; }
        .btn-success { background: var(--green-lt); color: var(--green); border: 1.5px solid #a7d9c0; }
        .btn-blue { background: #e8f0f8; color: var(--accent); border: 1.5px solid #b8cfe0; }
        .btn-gold { background: var(--amber-lt); color: var(--amber); border: 1.5px solid #e8c97a; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 0; }
        .btn-row button { margin: 0; }
        .btn-icon { padding: 7px; font-size: 0.85rem; border-radius: 7px; min-width: 32px; width: auto; margin: 0; display: flex; align-items: center; justify-content: center; }
        .btn-edit-icon { background: var(--amber-lt); color: var(--amber); border: 1px solid #f0d08a; }
        .btn-del-icon  { background: var(--red-lt);   color: var(--red);   border: 1px solid #e8b4b4; }

        /* ── QUICK OPTION ── */
        .quick-option { background: #eef4fb; border: 1.5px solid #c3d9ee; padding: 12px 14px; border-radius: 9px; margin-bottom: 14px; }
        .quick-label { display: flex; align-items: center; gap: 9px; color: var(--accent); font-weight: 600; font-size: 0.88rem; cursor: pointer; }
        .quick-label input { width: 16px; height: 16px; padding: 0; margin: 0; accent-color: var(--accent); }
        .quick-desc { font-size: 0.72rem; color: #6a92b8; margin: 5px 0 0 25px; }

        /* ── IVA BOX ── */
        .iva-box { background: var(--green-lt); padding: 14px; border-radius: 9px; border: 1.5px solid #a7d9c0; margin-bottom: 14px; }
        .iva-box > label { color: var(--green); font-weight: 700; margin-bottom: 8px; }
        .iva-box select { margin-bottom: 10px; background: #fff; }
        .iva-btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-iva { background: #fff; color: var(--green); border: 1.5px solid #a7d9c0; padding: 10px; font-size: 0.75rem; font-weight: 600; border-radius: 7px; width: 100%; margin: 0; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
        .btn-iva:hover { background: var(--green-lt); }

        /* ── TABLA ── */
        .table-wrap { overflow-x: auto; border-radius: 9px; border: 1.5px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
        thead tr { background: #fafaf8; }
        th { padding: 11px 12px; border-bottom: 1.5px solid var(--border); text-align: left; font-size: 0.65rem; font-weight: 700; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
        td { padding: 10px 12px; border-bottom: 1px solid #f2f0ec; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tbody tr { transition: background 0.1s; }
        tbody tr:hover { background: #fafaf8; }
        .action-btns { display: flex; gap: 6px; }
        .td-code { font-weight: 700; color: var(--accent); font-size: 0.8rem; font-variant-numeric: tabular-nums; }
        .empty-row td { text-align: center; color: var(--muted); padding: 20px; font-size: 0.82rem; }

        /* ── TOTALES ── */
        .totals-ok  { color: var(--green); font-weight: 700; }
        .totals-err { color: var(--red);   font-weight: 700; }

        /* ── TAB BAR ── */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--ink); display: flex; justify-content: space-around; padding: 10px 0 14px; z-index: 200; box-shadow: 0 -1px 0 rgba(255,255,255,0.06); }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.58rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(255,255,255,0.32); cursor: pointer; flex: 1; transition: color 0.15s; }
        .tab-item .tab-icon { font-size: 1.1rem; display: block; transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1); }
        .tab-item.active { color: var(--accent-2); }
        .tab-item.active .tab-icon { transform: translateY(-2px); }

        /* ── OVERLAYS ── */
        #loading-overlay { position: fixed; inset: 0; background: var(--ink); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        #loading-overlay.hidden { display: none; }
        .loader-brand { font-family: 'DM Serif Display', serif; font-size: 2.2rem; margin-bottom: 4px; }
        .loader-sub { font-size: 0.68rem; color: var(--accent-2); letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 40px; }
        .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.15); border-top-color: var(--accent-2); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }

        #success-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 2000; display: flex; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.1s ease; }
        #success-overlay.visible { opacity: 1; }
        .success-icon { font-size: 2.5rem; background: var(--ink); color: #4ade80; border-radius: 50%; width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; box-shadow: 0 20px 60px rgba(15,17,23,0.4); transform: scale(0.5); transition: transform 0.22s cubic-bezier(0.175,0.885,0.32,1.275); }
        #success-overlay.visible .success-icon { transform: scale(1); }

        /* ── ZONA PELIGRO ── */
        .danger-card { border: 1.5px solid #e8b4b4; border-radius: var(--radius); padding: 16px; background: var(--red-lt); margin-bottom: 16px; }
        .danger-card .card-title { border-color: #e8b4b4; color: var(--red); }

        /* ── DOS COLUMNAS ── */
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .two-col .form-group { margin-bottom: 0; }

        /* ── REPORTE PILLS ── */
        .rep-pill {
            flex: 1; min-width: 80px; padding: 9px 8px; font-size: 0.78rem; font-weight: 700;
            border-radius: 8px; border: 1.5px solid var(--border);
            background: var(--card); color: var(--muted);
            cursor: pointer; transition: all 0.15s; margin: 0; width: auto;
            letter-spacing: 0.02em; text-align: center;
        }
        .rep-pill.active {
            background: var(--accent); color: #fff;
            border-color: var(--accent);
            box-shadow: 0 2px 8px rgba(26,60,94,0.25);
        }

        /* ── TABLA INLINE ── */
        #rep-tabla-inline table { min-width: 500px; }
        #rep-tabla-inline th {
            background: #1a3c5e; color: #fff;
            padding: 8px 10px; font-size: 0.65rem; text-transform: uppercase;
            letter-spacing: 0.08em; white-space: nowrap; position: sticky; top: 0; z-index: 2;
        }
        #rep-tabla-inline td { padding: 7px 10px; border-bottom: 1px solid #f2f0ec; font-size: 0.78rem; white-space: nowrap; }
        #rep-tabla-inline tr.enc-row td  { background: #dce8f5; font-weight: 700; font-size: 0.75rem; color: #0f1117; padding: 7px 10px; }
        #rep-tabla-inline tr.col-head td { background: #f0f4f8; font-weight: 700; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; color: #4b5563; }
        #rep-tabla-inline tr.tot-row  td { background: #f8f4ec; border-top: 2px solid #c8a96e; font-weight: 700; font-size: 0.78rem; }
        #rep-tabla-inline tr.glosa-row td { font-style: italic; color: #6b7280; font-size: 0.72rem; border-bottom: 2px double #1a3c5e; }
        #rep-tabla-inline tr.spacer-row td { padding: 4px 0; border-bottom: none; }
        #rep-tabla-inline .num { text-align: right; font-variant-numeric: tabular-nums; }
        #rep-tabla-inline .saldo { color: var(--accent); font-weight: 600; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader-brand">ContaApp</div>
        <div class="loader-sub">Conectando con la nube</div>
        <div class="spinner"></div>
    </div>

    <header>
        <div class="header-brand">
            <span class="header-title">ContaApp Pro</span>
            <span class="header-sub">Sistema Contable</span>
        </div>
        <div id="sync-status">
            <div id="sync-dot"></div>
            <span id="sync-label">Conectando</span>
        </div>
    </header>

    <!-- ══ RUBROS ══ -->
    <div id="win-rubros" class="window active">
        <div class="section-header">
            <div class="section-number">Módulo 01</div>
            <h1 class="section-title">Rubros <span id="label-edit-r" class="edit-badge" style="display:none">Editando</span></h1>
        </div>
        <div class="card">
            <div class="card-title">Datos del Rubro</div>
            <div class="form-group">
                <label>Código (2 dígitos)</label>
                <input type="text" id="r_cod" maxlength="2" placeholder="01">
                <div id="sug_r" class="hint"></div>
            </div>
            <div class="form-group">
                <label>Nombre del Rubro</label>
                <input type="text" id="r_nom" placeholder="Ej. Activo Corriente">
            </div>
            <label style="margin-bottom:8px;">Estados Financieros</label>
            <div class="check-grid">
                <label><input type="checkbox" class="ef-check" value="A"> Balance General</label>
                <label><input type="checkbox" class="ef-check" value="B"> Estado de Resultados</label>
                <label><input type="checkbox" class="ef-check" value="C"> Flujo de Efectivo</label>
                <label><input type="checkbox" class="ef-check" value="D"> Cambio en Capital</label>
            </div>
            <button class="btn-primary" onclick="guardarRubro()">Guardar Rubro</button>
            <button id="btn-cancel-r" class="btn-ghost" style="display:none" onclick="cancelarEdicion()">Cancelar edición</button>
        </div>
    </div>

    <!-- ══ CUENTAS ══ -->
    <div id="win-cuentas" class="window">
        <div class="section-header">
            <div class="section-number">Módulo 02</div>
            <h1 class="section-title">Cuentas <span id="label-edit-c" class="edit-badge" style="display:none">Editando</span></h1>
        </div>
        <div class="card">
            <div class="card-title">Datos de la Cuenta</div>
            <div class="quick-option">
                <label class="quick-label">
                    <input type="checkbox" id="c_auto_sub" style="width:16px;height:16px;padding:0;margin:0;accent-color:var(--accent)">
                    ⚡ Crear subcuenta 001 automáticamente
                </label>
                <p class="quick-desc">Genera la primera subcuenta con el mismo nombre al guardar.</p>
            </div>
            <div class="form-group">
                <label>Rubro Padre</label>
                <select id="c_padre" onchange="sugerirCta()"></select>
            </div>
            <div class="form-group">
                <label>Código de Cuenta (3 dígitos — sufijo)</label>
                <input type="text" id="c_cod_suf" maxlength="3" placeholder="001">
                <div id="sug_c" class="hint"></div>
            </div>
            <div class="form-group">
                <label>Nombre de la Cuenta</label>
                <input type="text" id="c_nom" placeholder="Ej. Caja y Bancos">
            </div>
            <div class="form-group">
                <label>Naturaleza Contable</label>
                <select id="c_nat">
                    <option value="Deudora">Deudora</option>
                    <option value="Acreedora">Acreedora</option>
                </select>
            </div>
            <button class="btn-primary" onclick="guardarCuenta()">Guardar Cuenta</button>
            <button id="btn-cancel-c" class="btn-ghost" style="display:none" onclick="cancelarEdicion()">Cancelar edición</button>
        </div>
    </div>

    <!-- ══ SUBCUENTAS ══ -->
    <div id="win-subs" class="window">
        <div class="section-header">
            <div class="section-number">Módulo 03</div>
            <h1 class="section-title">Subcuentas <span id="label-edit-s" class="edit-badge" style="display:none">Editando</span></h1>
        </div>
        <div class="card">
            <div class="card-title">Datos de la Subcuenta</div>
            <div class="form-group">
                <label>Cuenta Padre</label>
                <select id="s_padre" onchange="sugerirSub()"></select>
            </div>
            <div class="form-group">
                <label>Código de Subcuenta (3 dígitos — sufijo)</label>
                <input type="text" id="s_cod_suf" maxlength="3" placeholder="001">
                <div id="sug_s" class="hint"></div>
            </div>
            <div class="form-group">
                <label>Nombre de la Subcuenta</label>
                <input type="text" id="s_nom" placeholder="Ej. Banco Nacional">
            </div>
            <label style="margin-bottom:8px;">Clasificaciones</label>
            <div class="check-grid">
                <label><input type="checkbox" id="s_pyg"> Pérdidas y Ganancias</label>
                <label><input type="checkbox" id="s_inv"> Inventario</label>
            </div>
            <div class="check-grid check-single">
                <label><input type="checkbox" id="s_is_iva"> 💰 Cuenta de IVA</label>
            </div>
            <button class="btn-primary" onclick="guardarSubcuenta()">Guardar Subcuenta</button>
            <button id="btn-cancel-s" class="btn-ghost" style="display:none" onclick="cancelarEdicion()">Cancelar edición</button>
        </div>
    </div>
